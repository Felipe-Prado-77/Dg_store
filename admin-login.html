<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#07090d">
  <title>Entrar no painel | DG Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="admin-login.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <a class="login-logo" href="index.html"><img src="assets/logo.png" alt="DG Store"></a>
      <span class="eyebrow">ÁREA RESTRITA</span>
      <h1>Painel administrativo</h1>
      <p>Entre com o usuário criado no Supabase para administrar a loja.</p>
      <div class="backend-warning" id="backendWarning" hidden><strong>Backend ainda não configurado</strong><span>Preencha <code>backend-config.js</code> antes de usar o login real.</span></div>
      <form id="adminLoginForm" novalidate>
        <label><span>E-mail</span><input id="adminEmail" type="email" autocomplete="username" required></label>
        <label><span>Senha</span><input id="adminPassword" type="password" autocomplete="current-password" minlength="8" required></label>
        <p id="loginError" role="alert"></p>
        <button class="button button-primary" type="submit">Entrar no painel</button>
      </form>
      <a class="back-link" href="index.html">← Voltar para a loja</a>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="backend-config.js"></script>
  <script src="backend.js"></script>
  <script src="admin-login.js"></script>
</body>
</html>
